<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Townley Packs</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

:root {
  --bg:       #080810;
  --bg2:      #10101c;
  --bg3:      #18182a;
  --bg4:      #20203a;
  --card:     #12121f;
  --border:   #ffffff12;
  --border2:  #ffffff22;
  --text:     #f0f0ff;
  --text2:    #8080a8;
  --text3:    #505070;
  --accent:   #8b6fff;
  --accent2:  #6b4fdf;
  --glow:     rgba(139,111,255,0.5);
}
.light {
  --bg:       #f4f4ff;
  --bg2:      #eaeaf8;
  --bg3:      #dedeed;
  --bg4:      #d2d2e2;
  --card:     #ffffff;
  --border:   #00000012;
  --border2:  #00000022;
  --text:     #080820;
  --text2:    #50507a;
  --text3:    #8888aa;
  --accent:   #6b4fdf;
  --accent2:  #8b6fff;
  --glow:     rgba(107,79,223,0.3);
}

*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:'Inter',system-ui,sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  display:flex;
  flex-direction:column;
  transition:background .3s,color .3s;
  overflow-x:hidden;
}

/* ─── HEADER ─── */
header{
  background:var(--bg2);
  border-bottom:1px solid var(--border);
  padding:0 24px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  height:60px;
  position:sticky;top:0;z-index:100;
  backdrop-filter:blur(12px);
}
.logo{
  font-size:20px;font-weight:900;letter-spacing:-1px;
  background:linear-gradient(135deg,#fff 0%,#8b6fff 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.light .logo{background:linear-gradient(135deg,#080820 0%,#6b4fdf 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}

/* Toggle */
.toggle-wrap{display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none;padding:6px 12px;border-radius:20px;border:1px solid var(--border2);background:var(--bg3);transition:all .2s}
.toggle-wrap:hover{border-color:var(--accent)}
.toggle-label{font-size:12px;font-weight:600;color:var(--text2)}
.tog{width:36px;height:20px;background:var(--bg4);border-radius:10px;position:relative;transition:.3s}
.tog::after{content:'';position:absolute;top:3px;left:3px;width:14px;height:14px;border-radius:50%;background:var(--text2);transition:.3s}
.light .tog{background:var(--accent)}
.light .tog::after{transform:translateX(16px);background:#fff}

/* ─── NAV ─── */
nav{
  background:var(--bg2);
  border-bottom:1px solid var(--border);
  display:flex;gap:0;
}
.tab{
  padding:14px 28px;font-size:13px;font-weight:700;letter-spacing:.3px;
  cursor:pointer;color:var(--text3);border-bottom:2px solid transparent;
  transition:all .2s;user-select:none;position:relative;text-transform:uppercase;
}
.tab:hover{color:var(--text2)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.notif-badge{
  position:absolute;top:10px;right:8px;
  min-width:16px;height:16px;border-radius:8px;
  background:#ef4444;color:#fff;
  font-size:9px;font-weight:800;
  display:none;align-items:center;justify-content:center;padding:0 4px;
}
.notif-badge.show{display:flex}

/* ─── PAGES ─── */
.page{display:none;flex:1;flex-direction:column}
.page.active{display:flex}

/* ─── PACK PAGE ─── */
#page-packs{
  align-items:center;justify-content:center;
  min-height:calc(100vh - 120px);
  padding:40px 20px;gap:0;
  background:radial-gradient(ellipse at 50% 30%,rgba(139,111,255,.08) 0%,transparent 70%);
}

.pack-hero{display:flex;flex-direction:column;align-items:center;gap:8px;margin-bottom:40px}
.pack-hero-title{font-size:38px;font-weight:900;letter-spacing:-1.5px;text-align:center}
.pack-hero-sub{font-size:14px;color:var(--text2);font-weight:500}

/* Pack card 3D */
.pack-3d-wrap{perspective:800px;cursor:pointer;margin-bottom:32px}
.pack-3d{
  width:170px;height:240px;border-radius:20px;
  position:relative;transform-style:preserve-3d;
  transition:transform .15s;
  background:linear-gradient(145deg,#6b4fdf,#8b6fff,#b39dff);
  box-shadow:0 20px 60px rgba(139,111,255,.5),0 0 0 1px rgba(255,255,255,.15);
}
.pack-3d-wrap:hover .pack-3d{transform:rotateY(-12deg) rotateX(6deg) scale(1.06);box-shadow:0 30px 80px rgba(139,111,255,.7),0 0 0 1px rgba(255,255,255,.2)}
.pack-3d::before{
  content:'';position:absolute;inset:0;border-radius:20px;
  background:linear-gradient(180deg,rgba(255,255,255,.25) 0%,transparent 50%);
}
.pack-3d-inner{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:8px;
}
.pack-icon{font-size:52px;filter:drop-shadow(0 4px 12px rgba(0,0,0,.4))}
.pack-name{
  font-size:11px;font-weight:800;letter-spacing:3px;text-transform:uppercase;
  color:rgba(255,255,255,.9);text-shadow:0 1px 4px rgba(0,0,0,.4)
}
.pack-shine{
  position:absolute;inset:0;border-radius:20px;
  background:linear-gradient(105deg,transparent 40%,rgba(255,255,255,.15) 50%,transparent 60%);
  animation:packShine 3s ease-in-out infinite;
}
@keyframes packShine{0%,100%{opacity:0;transform:translateX(-100%)}50%{opacity:1;transform:translateX(100%)}}

.btn-open{
  background:linear-gradient(135deg,var(--accent2),var(--accent));
  color:#fff;border:none;border-radius:40px;
  padding:16px 52px;font-size:16px;font-weight:800;letter-spacing:.5px;
  cursor:pointer;transition:all .15s;
  box-shadow:0 8px 32px rgba(139,111,255,.5);
  text-transform:uppercase;
}
.btn-open:hover{transform:translateY(-2px);box-shadow:0 12px 40px rgba(139,111,255,.7)}
.btn-open:active{transform:scale(.97)}
.btn-open:disabled{opacity:.35;cursor:not-allowed;transform:none;box-shadow:none}

.pack-meta{display:flex;gap:24px;margin-top:24px}
.pack-meta-item{text-align:center}
.pack-meta-num{font-size:22px;font-weight:900;color:var(--accent)}
.pack-meta-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;font-weight:600}

.streak-toast{
  margin-top:16px;font-size:13px;font-weight:700;
  color:#fbbf24;min-height:20px;text-align:center;
  transition:opacity .3s;
}

/* ─── REVEAL OVERLAY ─── */
#reveal-overlay{
  position:fixed;inset:0;z-index:500;
  display:none;align-items:center;justify-content:center;
  flex-direction:column;
}
#reveal-overlay.show{display:flex}

.reveal-bg{
  position:absolute;inset:0;
  background:rgba(0,0,0,.92);
  backdrop-filter:blur(8px);
}

.reveal-stage{
  position:relative;z-index:1;
  display:flex;flex-direction:column;align-items:center;gap:20px;
}

/* Common: simple pop */
.anim-common .reveal-card-wrap{animation:revealCommon 2.75s ease forwards}
@keyframes revealCommon{
  0%{opacity:0;transform:scale(.3) rotate(-10deg)}
  25%{opacity:1;transform:scale(1.05) rotate(2deg)}
  40%{transform:scale(.97) rotate(0)}
  55%{transform:scale(1) rotate(0)}
  100%{transform:scale(1) rotate(0);opacity:1}
}

/* Uncommon: slide up with a soft puff of light */
.anim-uncommon .reveal-card-wrap{animation:revealUncommon 2.75s cubic-bezier(.22,1.1,.4,1) forwards}
@keyframes revealUncommon{
  0%{opacity:0;transform:translateY(80px) scale(.5)}
  30%{opacity:1;transform:translateY(-16px) scale(1.08)}
  50%{transform:translateY(0) scale(1)}
  100%{transform:translateY(0) scale(1);opacity:1}
}
.anim-uncommon .reveal-rays{display:block;animation:raysIn .4s .4s ease forwards;opacity:0}
.anim-uncommon .reveal-flash{animation:flashPulseSoft 2.75s ease forwards}

/* Rare: spin slam + ring pulse + light shake */
.anim-rare .reveal-card-wrap{animation:revealRare 2.75s cubic-bezier(.34,1.4,.5,1) forwards}
@keyframes revealRare{
  0%{opacity:0;transform:scale(0) rotate(180deg)}
  35%{opacity:1;transform:scale(1.16) rotate(-6deg)}
  50%{transform:scale(.94) rotate(3deg)}
  65%{transform:scale(1.04) rotate(-1deg)}
  80%{transform:scale(.99) rotate(0)}
  100%{transform:scale(1) rotate(0);opacity:1}
}
.anim-rare .reveal-rays{display:block;animation:raysIn .3s .5s ease forwards;opacity:0}
.anim-rare .reveal-rays #ray-spin{animation:raySpin 11s linear infinite}
.anim-rare .reveal-stage{animation:shakeSmall .4s ease .42s}
.anim-rare .reveal-flash{animation:flashPulse1 2.75s ease forwards}

/* Epic: crash down + impact shake + double ring */
.anim-epic .reveal-card-wrap{animation:revealEpic 2.75s cubic-bezier(.2,1.5,.35,1) forwards}
@keyframes revealEpic{
  0%{opacity:0;transform:translateY(-220px) scale(.8) rotate(-3deg)}
  30%{opacity:1;transform:translateY(14px) scale(1.14) rotate(2deg)}
  45%{transform:translateY(-8px) scale(.96) rotate(-1deg)}
  58%{transform:translateY(5px) scale(1.03) rotate(0)}
  72%{transform:translateY(-2px) scale(.99)}
  100%{transform:translateY(0) scale(1);opacity:1}
}
.anim-epic .reveal-rays{display:block;animation:raysIn .3s .35s ease forwards;opacity:0}
.anim-epic .reveal-rays #ray-spin{animation:raySpin 8s linear infinite}
.anim-epic .reveal-ring{display:block;animation:ringOut .6s .32s ease forwards;opacity:0}
.anim-epic .reveal-ring-2{display:block;animation:ringOut .7s .42s ease forwards;opacity:0}
.anim-epic .reveal-stage{animation:shakeMedium .5s ease .3s}
.anim-epic .reveal-flash{animation:flashPulse2 2.75s ease forwards}

/* Legendary: earthquake slam + golden rays + heavier shake */
.anim-legendary .reveal-card-wrap{animation:revealLegendary 2.75s ease forwards}
@keyframes revealLegendary{
  0%{opacity:0;transform:scale(0) rotate(-360deg)}
  30%{opacity:1;transform:scale(1.3) rotate(12deg)}
  45%{transform:scale(.88) rotate(-6deg)}
  60%{transform:scale(1.1) rotate(3deg)}
  75%{transform:scale(.96) rotate(0)}
  88%{transform:scale(1.04)}
  100%{transform:scale(1);opacity:1}
}
.anim-legendary .reveal-rays{display:block;animation:raysIn .2s .25s ease forwards;opacity:0}
.anim-legendary .reveal-rays #ray-spin{animation:raySpin 6s linear infinite}
.anim-legendary .reveal-ring{display:block;animation:ringOut .5s .26s ease forwards;opacity:0}
.anim-legendary .reveal-ring-2{display:block;animation:ringOut .6s .36s ease forwards;opacity:0}
.anim-legendary .reveal-sparkles{display:block}
.anim-legendary .reveal-stage{animation:shakeMedium .55s ease .26s}
.anim-legendary .reveal-flash{background:radial-gradient(circle at 50% 45%,#fff6d8 0%,transparent 65%);animation:flashPulse3 2.75s ease forwards}

/* Mythic: glitch shatter — chromatic split, double flash, shifting backdrop */
.anim-mythic .reveal-card-wrap{animation:revealMythic 2.75s ease forwards}
@keyframes revealMythic{
  0%{opacity:0;transform:scale(.1)}
  15%{opacity:1;transform:scale(1.45) rotate(9deg)}
  28%{transform:scale(.82) rotate(-7deg)}
  40%{transform:scale(1.18) rotate(5deg)}
  52%{transform:scale(.93) rotate(-3deg)}
  64%{transform:scale(1.07)}
  76%{transform:scale(.97)}
  88%{transform:scale(1.02)}
  100%{transform:scale(1);opacity:1}
}
.anim-mythic .reveal-rays{display:block;animation:raysIn .15s .1s ease forwards;opacity:0}
.anim-mythic .reveal-rays #ray-spin{animation:raySpin 4s linear infinite reverse}
.anim-mythic .reveal-ring{display:block;animation:ringOut .4s .12s ease forwards;opacity:0}
.anim-mythic .reveal-ring-2{display:block;animation:ringOut .45s .22s ease forwards;opacity:0}
.anim-mythic .reveal-sparkles{display:block}
.anim-mythic .reveal-bg{animation:mythicBg 2.75s ease}
.anim-mythic .reveal-stage{animation:shakeMedium .5s ease .12s}
.anim-mythic .reveal-char-name{animation:glitchText 2.75s steps(2) forwards}
.anim-mythic .reveal-card{animation:chromaSplit 2.75s steps(2) forwards}
.anim-mythic .reveal-flash{background:radial-gradient(circle at 50% 45%,#ffd6f0 0%,transparent 65%);animation:flashPulse4 2.75s ease forwards}
@keyframes mythicBg{
  0%,100%{background:rgba(0,0,0,.92)}
  20%{background:rgba(20,0,40,.97)}
  40%{background:rgba(40,0,20,.95)}
  60%{background:rgba(0,20,40,.97)}
}
@keyframes glitchText{
  0%,12%,100%{text-shadow:0 2px 12px rgba(0,0,0,.8)}
  14%{text-shadow:-3px 0 #f472b6,3px 0 #60a5fa,0 2px 12px rgba(0,0,0,.8);transform:translateX(-2px)}
  16%{text-shadow:3px 0 #f472b6,-3px 0 #60a5fa,0 2px 12px rgba(0,0,0,.8);transform:translateX(2px)}
  18%,38%{text-shadow:0 2px 12px rgba(0,0,0,.8);transform:translateX(0)}
  40%{text-shadow:-2px 0 #f472b6,2px 0 #60a5fa;transform:translateX(-1px)}
  42%,100%{text-shadow:0 2px 12px rgba(0,0,0,.8);transform:translateX(0)}
}
@keyframes chromaSplit{
  0%,12%,100%{box-shadow:0 24px 80px rgba(0,0,0,.8)}
  14%{box-shadow:-4px 0 0 rgba(244,114,182,.6),4px 0 0 rgba(96,165,250,.6),0 24px 80px rgba(0,0,0,.8)}
  17%{box-shadow:0 24px 80px rgba(0,0,0,.8)}
}

/* Godly: EVERYTHING — triple flash, fast spin, brightness storm, heaviest shake */
.anim-godly .reveal-card-wrap{animation:revealGodly 2.75s ease forwards}
@keyframes revealGodly{
  0%{opacity:0;transform:scale(0) rotate(-720deg)}
  20%{opacity:1;transform:scale(1.55) rotate(22deg)}
  32%{transform:scale(.72) rotate(-13deg)}
  44%{transform:scale(1.32) rotate(9deg)}
  54%{transform:scale(.86) rotate(-5deg)}
  63%{transform:scale(1.17) rotate(2deg)}
  72%{transform:scale(.94)}
  80%{transform:scale(1.07)}
  88%{transform:scale(.99)}
  94%{transform:scale(1.03)}
  100%{transform:scale(1);opacity:1}
}
.anim-godly .reveal-rays{display:block;animation:raysIn .1s .05s ease forwards;opacity:0}
.anim-godly .reveal-rays #ray-spin{animation:raySpin 2.4s linear infinite}
.anim-godly .reveal-ring{display:block;animation:ringOut .3s .08s ease forwards;opacity:0}
.anim-godly .reveal-ring-2{display:block;animation:ringOut .35s .16s ease forwards;opacity:0}
.anim-godly .reveal-sparkles{display:block}
.anim-godly .reveal-bg{animation:godlyBg 2.75s ease}
.anim-godly .reveal-stage{animation:shakeHuge .6s ease .05s}
.anim-godly .reveal-card-wrap{animation:revealGodly 2.75s ease forwards,godlyBrightness 2.75s linear forwards}
.anim-godly .reveal-flash{background:radial-gradient(circle at 50% 45%,#fff 0%,transparent 70%);animation:flashPulse5 2.75s ease forwards}
@keyframes godlyBg{
  0%{background:rgba(0,0,0,.92)}
  15%{background:rgba(30,0,0,.97)}
  30%{background:rgba(30,20,0,.97)}
  45%{background:rgba(0,20,40,.97)}
  60%{background:rgba(20,0,30,.97)}
  75%{background:rgba(0,30,20,.97)}
  100%{background:rgba(0,0,0,.92)}
}
@keyframes godlyBrightness{
  0%,18%{filter:brightness(1)}
  20%{filter:brightness(1.9)}
  23%,42%{filter:brightness(1)}
  44%{filter:brightness(2.1)}
  47%,78%{filter:brightness(1)}
  80%{filter:brightness(1.7)}
  83%,100%{filter:brightness(1)}
}

/* ─── SCREEN SHAKE (applied to the whole reveal stage on impact) ─── */
@keyframes shakeSmall{
  0%,100%{transform:translate(0,0)}
  20%{transform:translate(-3px,1px)}
  40%{transform:translate(3px,-1px)}
  60%{transform:translate(-2px,1px)}
  80%{transform:translate(2px,0)}
}
@keyframes shakeMedium{
  0%,100%{transform:translate(0,0)}
  10%{transform:translate(-6px,3px) rotate(-.4deg)}
  25%{transform:translate(6px,-3px) rotate(.4deg)}
  40%{transform:translate(-5px,2px) rotate(-.3deg)}
  55%{transform:translate(4px,-2px) rotate(.2deg)}
  70%{transform:translate(-2px,1px)}
  85%{transform:translate(2px,-1px)}
}
@keyframes shakeHuge{
  0%,100%{transform:translate(0,0)}
  8%{transform:translate(-10px,5px) rotate(-.7deg)}
  18%{transform:translate(10px,-5px) rotate(.7deg)}
  28%{transform:translate(-9px,4px) rotate(-.5deg)}
  38%{transform:translate(8px,-4px) rotate(.5deg)}
  50%{transform:translate(-6px,3px) rotate(-.3deg)}
  62%{transform:translate(5px,-2px) rotate(.3deg)}
  75%{transform:translate(-3px,1px)}
  88%{transform:translate(3px,-1px)}
}

/* Shared effects */
.reveal-rays{
  display:none;position:absolute;width:500px;height:500px;
  top:50%;left:50%;transform:translate(-50%,-50%);
  border-radius:50%;pointer-events:none;z-index:-1;
}
@keyframes raysIn{from{opacity:0;transform:translate(-50%,-50%) scale(0)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}
@keyframes raySpin{from{transform:rotate(0)}to{transform:rotate(360deg)}}

.reveal-ring,.reveal-ring-2{
  display:none;position:absolute;
  width:260px;height:260px;border-radius:50%;
  border:4px solid rgba(255,255,255,.8);
  top:50%;left:50%;transform:translate(-50%,-50%);
  pointer-events:none;
}
.reveal-ring-2{border-width:2px;border-color:rgba(255,255,255,.5)}
@keyframes ringOut{from{opacity:.8;transform:translate(-50%,-50%) scale(.5)}to{opacity:0;transform:translate(-50%,-50%) scale(2)}}

.reveal-flash{
  position:absolute;inset:0;pointer-events:none;opacity:0;
  mix-blend-mode:screen;z-index:0;
  background:radial-gradient(circle at 50% 45%,#fff 0%,transparent 65%);
}
@keyframes flashPulseSoft{0%,0%{opacity:0}30%{opacity:.25}45%{opacity:0}100%{opacity:0}}
@keyframes flashPulse1{0%,33%{opacity:0}35%{opacity:.4}50%{opacity:0}100%{opacity:0}}
@keyframes flashPulse2{0%,28%{opacity:0}30%{opacity:.55}48%{opacity:0}100%{opacity:0}}
@keyframes flashPulse3{0%,28%{opacity:0}30%{opacity:.7}50%{opacity:0}100%{opacity:0}}
@keyframes flashPulse4{0%,13%{opacity:0}15%{opacity:.85}38%{opacity:0}40%{opacity:.4}55%{opacity:0}100%{opacity:0}}
@keyframes flashPulse5{0%,18%{opacity:0}20%{opacity:1}30%{opacity:.15}33%{opacity:.9}44%{opacity:0}48%{opacity:.6}60%{opacity:0}100%{opacity:0}}

.reveal-sparkles{
  display:none;position:absolute;inset:0;pointer-events:none;
}
.sparkle{
  position:absolute;width:6px;height:6px;border-radius:50%;
  animation:sparkleFly 1.5s ease-out forwards;
  box-shadow:0 0 8px 2px currentColor;
}
@keyframes sparkleFly{
  0%{opacity:1;transform:translate(0,0) scale(1)}
  100%{opacity:0;transform:var(--tx,0) var(--ty,0) scale(0)}
}

/* The card itself */
.reveal-card-wrap{display:flex;flex-direction:column;align-items:center;gap:16px;position:relative}
.reveal-card{
  width:220px;height:220px;border-radius:20px;
  overflow:hidden;border:3px solid rgba(255,255,255,.3);
  position:relative;background:var(--bg3);
  box-shadow:0 24px 80px rgba(0,0,0,.8);
}
.reveal-card img{
  width:100%;height:100%;object-fit:cover;display:block;
  opacity:0;transition:opacity .25s ease;position:relative;z-index:1;
}
.reveal-card img.loaded{opacity:1}
.reveal-card-fallback{
  width:100%;height:100%;
  background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:60px;
}
.reveal-card-spinner{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:0;
}
.reveal-card-spinner::after{
  content:'';width:30px;height:30px;border-radius:50%;
  border:3px solid rgba(255,255,255,.2);border-top-color:rgba(255,255,255,.8);
  animation:spinnerRotate .7s linear infinite;
}
@keyframes spinnerRotate{to{transform:rotate(360deg)}}

.reveal-rarity-label{
  font-size:11px;font-weight:800;letter-spacing:3px;text-transform:uppercase;
  padding:5px 16px;border-radius:20px;
}
.reveal-char-name{
  font-size:26px;font-weight:900;color:#fff;text-align:center;
  letter-spacing:-.5px;text-shadow:0 2px 12px rgba(0,0,0,.8);
}
.reveal-new-tag{
  background:linear-gradient(135deg,#22c55e,#4ade80);
  color:#052e16;font-size:11px;font-weight:900;
  letter-spacing:2px;text-transform:uppercase;
  padding:6px 18px;border-radius:20px;
  animation:newTagPop .4s cubic-bezier(.34,1.56,.64,1);
  box-shadow:0 4px 20px rgba(34,197,94,.5);
}
@keyframes newTagPop{from{opacity:0;transform:scale(0) rotate(-10deg)}to{opacity:1;transform:scale(1)}}

.btn-continue{
  background:rgba(255,255,255,.12);color:#fff;
  border:1px solid rgba(255,255,255,.25);
  padding:13px 36px;border-radius:30px;font-size:14px;font-weight:700;
  cursor:pointer;transition:opacity .35s,transform .35s,background .2s,border-color .2s;letter-spacing:.3px;
  backdrop-filter:blur(4px);

.reveal-card.glow-legendary{animation:glowLegendary 1.5s ease-in-out infinite .8s}

.reveal-card.glow-mythic{animation:glowMythic 1.2s ease-in-out infinite .6s}
@keyframes glowMythic{0%,100%{box-shadow:0 0 40px #f472b6,0 24px 80px rgba(0,0,0,.8)}50%{box-shadow:0 0 80px #f472b6,0 0 160px rgba(244,114,182,.5),0 0 200px rgba(168,85,247,.3)}}
.reveal-card.glow-godly{animation:glowGodly .8s ease-in-out infinite .4s}

  50%{box-shadow:0 0 60px #60a5fa,0 0 120px rgba(96,165,250,.4)}
  75%{box-shadow:0 0 60px #c084fc,0 0 120px rgba(192,132,252,.4)}
  100%{box-shadow:0 0 40px #f87171}
}

/* ─── INVENTORY ─── */
#page-inventory{background:var(--bg)}
.page-inner{flex:1;padding:24px;overflow-y:auto}

.page-topbar{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:20px;
}
.page-topbar h2{font-size:22px;font-weight:900;letter-spacing:-.5px}
.topbar-right{display:flex;align-items:center;gap:12px}
.stat-chip{
  background:var(--bg3);border:1px solid var(--border2);
  border-radius:20px;padding:5px 14px;
  font-size:12px;font-weight:700;color:var(--text2);
}

.char-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
  gap:14px;
}
.char-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:16px;overflow:hidden;position:relative;
  transition:transform .15s,box-shadow .15s;cursor:pointer;
}
.char-card:hover{transform:translateY(-3px)}
.char-card img{width:100%;aspect-ratio:1;object-fit:cover;display:block}
.char-card-fallback{width:100%;aspect-ratio:1;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:36px}
.char-card-info{padding:8px 10px 10px}
.char-card-name{font-size:11px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px}
.char-card-rarity{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.8px}

/* Count badge */
.badge-count{
  position:absolute;top:7px;right:7px;
  background:rgba(0,0,0,.75);color:#fff;
  font-size:11px;font-weight:800;border-radius:10px;padding:2px 7px;
  backdrop-filter:blur(4px);
}

/* NEW badge */
.badge-new{
  position:absolute;top:7px;left:7px;
  background:linear-gradient(135deg,#22c55e,#4ade80);
  color:#052e16;font-size:9px;font-weight:900;
  border-radius:10px;padding:3px 7px;letter-spacing:1px;text-transform:uppercase;
  animation:newBadgePulse 1.5s ease-in-out infinite;
  box-shadow:0 2px 10px rgba(34,197,94,.5);
}
@keyframes newBadgePulse{0%,100%{box-shadow:0 2px 10px rgba(34,197,94,.5)}50%{box-shadow:0 2px 20px rgba(34,197,94,.9)}}

/* Rarity borders */
.rb-common{border-color:#3a3a3a!important}
.rb-uncommon{border-color:#22c55e80!important}
.rb-rare{border-color:#3b82f680!important}
.rb-epic{border-color:#a855f780!important}
.rb-legendary{border-color:#f59e0b!important;box-shadow:0 0 14px rgba(245,158,11,.25)!important}
.rb-mythic{border-color:#ec4899!important;box-shadow:0 0 18px rgba(236,72,153,.35)!important}
.rb-godly{border-color:#ef4444!important;box-shadow:0 0 22px rgba(239,68,68,.45)!important}

/* ─── INDEX ─── */
#page-index{background:var(--bg)}
.index-section{margin-bottom:32px}
.index-section-header{
  display:flex;align-items:center;gap:10px;margin-bottom:14px;
}
.index-section-pill{
  font-size:11px;font-weight:800;letter-spacing:2px;text-transform:uppercase;
  padding:5px 14px;border-radius:20px;
}
.index-progress-text{font-size:12px;color:var(--text3);font-weight:600}
.index-progress-bar{
  flex:1;height:4px;background:var(--bg4);border-radius:2px;overflow:hidden;max-width:120px;
}
.index-progress-fill{height:100%;border-radius:2px;transition:width .5s ease}

.index-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px}
.index-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:14px;overflow:hidden;transition:transform .15s;
}
.index-card:hover{transform:translateY(-2px)}
.index-card img{width:100%;aspect-ratio:1;object-fit:cover;display:block}
.index-card-locked{
  width:100%;aspect-ratio:1;background:var(--bg3);
  display:flex;align-items:center;justify-content:center;
  font-size:28px;opacity:.4;filter:grayscale(1);
}
.index-card-info{padding:6px 8px 8px}
.index-card-name{font-size:10px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.index-card-status{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;margin-top:2px;color:var(--text3)}
.index-card-status.owned{color:#22c55e}

/* ─── RARITY BAR ─── */
.rarity-bar{
  background:var(--bg2);border-top:1px solid var(--border);
  padding:12px 24px;display:flex;flex-wrap:wrap;gap:6px 10px;justify-content:center;
  flex-shrink:0;
}
.rarity-pip{
  font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;
  padding:4px 10px;border-radius:20px;white-space:nowrap;
}

/* ─── RARITY COLOURS ─── */
.rc-common    {color:#9ca3af}
.rc-uncommon  {color:#4ade80}
.rc-rare      {color:#60a5fa}
.rc-epic      {color:#c084fc}
.rc-legendary {color:#fbbf24}
.rc-mythic    {color:#f472b6}
.rc-godly     {color:#f87171}

.rp-common    {background:#1f1f1f;color:#9ca3af}
.rp-uncommon  {background:#052e16;color:#4ade80}
.rp-rare      {background:#172554;color:#60a5fa}
.rp-epic      {background:#2e1065;color:#c084fc}
.rp-legendary {background:#451a03;color:#fbbf24}
.rp-mythic    {background:#500724;color:#f472b6}
.rp-godly     {background:#450a0a;color:#f87171}
.light .rp-common{background:#e5e7eb;color:#374151}
.light .rp-uncommon{background:#dcfce7;color:#166534}
.light .rp-rare{background:#dbeafe;color:#1d4ed8}
.light .rp-epic{background:#ede9fe;color:#7c3aed}
.light .rp-legendary{background:#fef3c7;color:#92400e}
.light .rp-mythic{background:#fce7f3;color:#9d174d}
.light .rp-godly{background:#fee2e2;color:#991b1b}

/* ─── CONFETTI CANVAS ─── */
#confetti-canvas{position:fixed;inset:0;pointer-events:none;z-index:600}

/* ─── EMPTY STATE ─── */
.empty-state{
  grid-column:1/-1;text-align:center;padding:60px 20px;
  color:var(--text3);
}
.empty-state .empty-icon{font-size:48px;margin-bottom:12px}
.empty-state p{font-size:14px;font-weight:500}

/* ─── AMBIENT PARTICLES (packs page) ─── */
.ambient-particles{position:absolute;inset:-60px;pointer-events:none;z-index:-1;overflow:visible}
.ambient-particles span{
  position:absolute;border-radius:50%;background:var(--accent);
  opacity:.35;filter:blur(1px);
  animation:ambientFloat linear infinite;
}
@keyframes ambientFloat{
  0%{transform:translate(0,0) scale(1);opacity:0}
  10%{opacity:.4}
  50%{transform:translate(var(--dx),var(--dy)) scale(1.3)}
  90%{opacity:.4}
  100%{transform:translate(0,0) scale(1);opacity:0}
}

/* ─── HOVER SHINE on char/index cards ─── */
.char-card,.index-card{position:relative}
.char-card::after,.index-card::after{
  content:'';position:absolute;inset:0;pointer-events:none;
  background:linear-gradient(115deg,transparent 35%,rgba(255,255,255,.25) 50%,transparent 65%);
  transform:translateX(-120%);transition:transform .55s ease;
}
.char-card:hover::after,.index-card:hover::after{transform:translateX(120%)}

/* ─── CHARACTER PREVIEW MODAL ─── */
#preview-overlay{
  position:fixed;inset:0;z-index:700;display:none;
  align-items:center;justify-content:center;
  background:rgba(0,0,0,.7);backdrop-filter:blur(6px);
  animation:previewBgIn .2s ease;
}
#preview-overlay.show{display:flex}
@keyframes previewBgIn{from{opacity:0}to{opacity:1}}
.preview-card{
  position:relative;background:var(--card);border:1px solid var(--border2);
  border-radius:20px;padding:28px;width:min(300px,84vw);
  display:flex;flex-direction:column;align-items:center;gap:10px;
  box-shadow:0 30px 80px rgba(0,0,0,.5);
  animation:previewCardIn .25s cubic-bezier(.34,1.56,.64,1);
}
@keyframes previewCardIn{from{opacity:0;transform:scale(.85) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}}
.preview-close{
  position:absolute;top:12px;right:12px;width:28px;height:28px;border-radius:50%;
  border:none;background:var(--bg3);color:var(--text2);font-size:13px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:.15s;
}
.preview-close:hover{background:var(--bg4);color:var(--text)}
.preview-img-wrap{
  width:160px;height:160px;border-radius:18px;overflow:hidden;
  background:var(--bg3);display:flex;align-items:center;justify-content:center;
  font-size:54px;border:3px solid var(--border2);
}
.preview-img-wrap img{width:100%;height:100%;object-fit:cover;display:block}
.preview-rarity-pill{
  font-size:11px;font-weight:800;letter-spacing:2px;text-transform:uppercase;
  padding:5px 14px;border-radius:20px;
}
.preview-name{font-size:18px;font-weight:900;text-align:center;letter-spacing:-.3px}
.preview-meta{font-size:12px;color:var(--text2);font-weight:600;text-align:center}

</head>

function loadState() {
  try {
    const s = localStorage.getItem('tp_state2');
    if (s) {
      const d = JSON.parse(s);

  localStorage.setItem('tp_state2', JSON.stringify({inventory, packsOpened, bestRarity, newItems}));
}

// ══════════════════════════════════════════════
//  AUDIO ENGINE
// ══════════════════════════════════════════════
let actx;
function ac() {
  if (!actx) actx = new (window.AudioContext||window.webkitAudioContext)();
  if (actx.state === 'suspended') actx.resume();
  return actx;
}

function tone(freq, start, dur, type='sine', vol=0.15, ramp=true) {
  if (soundMuted) return;
  const c = ac();
  const o = c.createOscillator();
  const g = c.createGain();
  o.connect(g); g.connect(c.destination);
  o.type = type; o.frequency.setValueAtTime(freq, c.currentTime + start);
  g.gain.setValueAtTime(0, c.currentTime + start);
  g.gain.linearRampToValueAtTime(vol, c.currentTime + start + 0.01);
  if (ramp) g.gain.exponentialRampToValueAtTime(0.0001, c.currentTime + start + dur);
  o.start(c.currentTime + start);
  o.stop(c.currentTime + start + dur + 0.05);
}

function playClick() { tone(700,.0,.08,'sine',.07); }
function playTab()   { tone(600,.0,.06,'sine',.06); tone(800,.05,.06,'sine',.04); }

function playRarityReveal(rarity) {
  if (soundMuted) return;
  const c = ac();
  const t = c.currentTime;

  if (rarity === 'common') {
    tone(300, 0,   .12, 'sine', .08);
    tone(380, .08, .1,  'sine', .07);
  }
  else if (rarity === 'uncommon') {
    tone(440, 0,   .15, 'sine', .12);
    tone(550, .12, .2,  'sine', .12);
    tone(660, .28, .25, 'sine', .1);
  }
  else if (rarity === 'rare') {
    [440,523,659,784].forEach((f,i) => tone(f, i*.1, .2, 'sine', .13));
    tone(1047, .45, .4, 'sine', .15);
  }
  else if (rarity === 'epic') {
    tone(220, 0, .3, 'sawtooth', .08);
    [329,415,523,659,830].forEach((f,i) => tone(f, .15+i*.1, .25, 'sine', .13));
    tone(1047, .7, .5, 'sine', .18);
    tone(1568, .9, .4, 'sine', .1);
  }
  else if (rarity === 'legendary') {
    tone(110, 0, .6, 'sine', .18);
    const chord = [523,659,784,1047,1319];
    chord.forEach((f,i) => tone(f, i*.08, .5, 'sine', .14));
    chord.forEach((f,i) => tone(f*2, .5+i*.06, .4, 'sine', .07));
    tone(2093, 1.1, .8, 'sine', .2);
    tone(2637, 1.4, .6, 'sine', .1);
  }
  else if (rarity === 'mythic') {
    // Sweeping drama
    const o = c.createOscillator(); const g = c.createGain();
    o.connect(g); g.connect(c.destination);
    o.type = 'sine'; o.frequency.setValueAtTime(80, t);
    o.frequency.exponentialRampToValueAtTime(1600, t+1.2);
    o.frequency.exponentialRampToValueAtTime(400, t+2.2);
    g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(.22,t+.1);
    g.gain.exponentialRampToValueAtTime(.0001,t+2.5);
    o.start(t); o.stop(t+2.6);

    const notes = [523,622,784,932,1175,1480,1865];
    notes.forEach((f,i) => { tone(f,.3+i*.12,.5,'sine',.12); tone(f*2,.4+i*.1,.3,'sine',.05); });
    tone(2794, 1.5, .8, 'sine', .2);
  }
  else if (rarity === 'godly') {
    // Full orchestral chaos
    const o = c.createOscillator(); const g = c.createGain();
    o.connect(g); g.connect(c.destination);
    o.type='sawtooth'; o.frequency.setValueAtTime(40,t);
    o.frequency.exponentialRampToValueAtTime(2000,t+1.5);
    o.frequency.exponentialRampToValueAtTime(60,t+2.8);
    g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(.15,t+.05);
    g.gain.exponentialRampToValueAtTime(.0001,t+3);
    o.start(t); o.stop(t+3.1);

    const scale=[261,329,392,523,659,784,1047,1319,1568,2093];
    scale.forEach((f,i)=>{
      tone(f,i*.1,.6,'sine',.15);
      tone(f*1.5,i*.1+.05,.4,'sine',.07);
      tone(f*2,i*.1+.1,.3,'sine',.04);
    });
    tone(4186,1.8,1.2,'sine',.25);
    tone(2093,2.0,1.0,'sine',.15);
    tone(1047,2.2,.8,'sine',.1);
  }
}

// ══════════════════════════════════════════════
//  PACK LOGIC
// ══════════════════════════════════════════════
function rollRarity() {
  const r = Math.random() * 100;
  let cum = 0;
  for (const rarity of RARITIES) {
    cum += rarity.chance;
    if (r < cum) return rarity.id;
  }
  return 'common';
}

function rollCharacter(rarityId) {
  const pool = CHARACTERS.filter(c => c.rarity === rarityId);
  if (rarityId === 'common') {
    const basic = pool.find(c => c.special === '1in4');
    const rest = pool.filter(c => !c.special);
    return Math.random() < 0.25 ? basic : rest[Math.floor(Math.random() * rest.length)];
  }
  return pool[Math.floor(Math.random() * pool.length)];
}

function openPack() {
  if (isAnimating) return;
  isAnimating = true;
  playClick();

  const packEl = document.getElementById('pack-el');
  packEl.style.animation = 'none';
  packEl.offsetHeight;
  packEl.style.animation = 'packBounce .5s cubic-bezier(.34,1.56,.64,1)';

  document.getElementById('btn-open').disabled = true;

  setTimeout(() => {
    const rarity = rollRarity();
    const char = rollCharacter(rarity);
    const wasNew = !inventory[char.id];

    inventory[char.id] = (inventory[char.id] || 0) + 1;
    packsOpened++;

    if (wasNew) {
      newItems[char.id] = true;
      document.getElementById('inv-notif').classList.add('show');
    }

    const ri = RARITY_ORDER.indexOf(rarity);
    const bi = bestRarity ? RARITY_ORDER.indexOf(bestRarity) : -1;
    if (ri > bi) bestRarity = rarity;

    saveState();
    updatePackStats();
    playRarityReveal(rarity);
    spawnConfetti(rarity);
    showReveal(char, rarity, wasNew);
  }, 400);
}

function updatePackStats() {
  document.getElementById('packs-count').textContent = packsOpened;
  const unique = CHARACTERS.filter(c => inventory[c.id]).length;
  document.getElementById('unique-count').textContent = unique;
  if (bestRarity) {
    const el = document.getElementById('best-rarity-display');
    el.textContent = bestRarity.charAt(0).toUpperCase() + bestRarity.slice(1);
    el.className = 'pack-meta-num rc-' + bestRarity;
  }

  const milestones = {10:'🔥 10 packs opened!',25:'💪 25 packs — dedicated!',50:'🌟 50 packs deep!',100:'👑 100 PACKS. Legend.',250:'😤 250 packs. Unreal.',500:'💀 500 packs. Seek help.'};
  const toast = document.getElementById('streak-toast');
  if (milestones[packsOpened]) {
    toast.textContent = milestones[packsOpened];
    toast.style.opacity = '1';
    setTimeout(() => { toast.style.opacity = '0'; }, 3500);
  }
}

// ══════════════════════════════════════════════
//  REVEAL
// ══════════════════════════════════════════════
function showReveal(char, rarity, isNew) {
  const overlay = document.getElementById('reveal-overlay');
  const wrap = document.getElementById('reveal-card-wrap');
  const card = document.getElementById('reveal-card');
  const img = document.getElementById('reveal-img');
  const fallback = document.getElementById('reveal-fallback');
  const spinner = document.getElementById('reveal-spinner');
  const nameEl = document.getElementById('reveal-char-name');
  const rarityLabel = document.getElementById('reveal-rarity-label');
  const newTag = document.getElementById('reveal-new-tag');
  const rData = RARITIES.find(r => r.id === rarity);

  rarityLabel.textContent = rData.label.toUpperCase();
  rarityLabel.className = 'reveal-rarity-label rp-' + rarity;

  // Reset image state immediately so a stale/previous character's image
  // can never be shown while the new one loads, and guard against a
  // late-arriving load/error event from a previous, since-replaced reveal.
  revealLoadToken++;
  const myToken = revealLoadToken;
  img.classList.remove('loaded');
  img.style.display = '';
  fallback.style.display = 'none';
  spinner.style.display = 'flex';
  img.onload = () => {
    if (myToken !== revealLoadToken) return;
    spinner.style.display = 'none';
    img.classList.add('loaded');
  };
  img.onerror = () => {
    if (myToken !== revealLoadToken) return;
    spinner.style.display = 'none';
    img.style.display = 'none';
    fallback.style.display = 'flex';
  };
  img.alt = char.name;
  img.src = char.img;
  // If this image was already preloaded/cached, the browser may have it
  // ready instantly — but onload still fires async, so the spinner never
  // gets stuck either way.

  nameEl.textContent = char.name;
  nameEl.style.color = rData.color;

  card.className = 'reveal-card';
  card.style.borderColor = rData.color;
  if (['legendary','mythic','godly'].includes(rarity)) {
    card.classList.add('glow-' + rarity);
  }

  newTag.style.display = isNew ? 'flex' : 'none';

  // Build rays
  buildRays(rarity, rData.color);
  // Build sparkles for higher rarities
  buildSparkles(rarity, rData.confetti);

  overlay.className = '';
  overlay.offsetHeight; // force reflow so repeated same-rarity pulls restart their animations
  overlay.className = 'anim-' + rarity;
  overlay.id = 'reveal-overlay';
  overlay.style.display = 'flex';

  // Reset + trigger animation on wrap
  wrap.style.animation = 'none';
  wrap.offsetHeight;
  wrap.style.animation = '';

  // Continue button: full animation (2.75s) for a brand new pull,
  // 30% through (~0.8s) if it's a duplicate the player has already seen.
  const continueBtn = document.getElementById('btn-continue');
  continueBtn.classList.remove('show');
  if (continueDelayTimer) clearTimeout(continueDelayTimer);
  const REVEAL_DURATION = 2750;
  const delay = isNew ? REVEAL_DURATION : REVEAL_DURATION * 0.3;
  continueDelayTimer = setTimeout(() => {
    continueBtn.classList.add('show');
  }, delay);
}

function buildRays(rarity, color) {
  const lines = document.getElementById('ray-lines');
  const rayEl = document.getElementById('reveal-rays');
  if (['common'].includes(rarity)) { rayEl.style.display='none'; return; }
  rayEl.style.display = 'block';

  const count = {uncommon:8,rare:12,epic:16,legendary:24,mythic:32,godly:40}[rarity]||8;
  lines.innerHTML = '';
  for (let i=0;i<count;i++) {
    const angle = (i/count)*360;
    const rad = angle * Math.PI/180;
    const len = 220 + Math.random()*60;
    const l = document.createElementNS('http://www.w3.org/2000/svg','line');
    l.setAttribute('x1','0');l.setAttribute('y1','0');
    l.setAttribute('x2', Math.cos(rad)*len);
    l.setAttribute('y2', Math.sin(rad)*len);
    l.setAttribute('stroke', color);
    l.setAttribute('stroke-width', 2+Math.random()*4);
    l.setAttribute('stroke-opacity', (.3+Math.random()*.4).toFixed(2));
    lines.appendChild(l);
  }
}

function buildSparkles(rarity, colors) {
  const container = document.getElementById('reveal-sparkles');
  if (!['epic','legendary','mythic','godly'].includes(rarity)) { container.innerHTML=''; return; }
  const count = {epic:20,legendary:35,mythic:50,godly:70}[rarity];
  container.innerHTML = '';
  for (let i=0;i<count;i++) {
    const s = document.createElement('div');
    s.className = 'sparkle';
    const cx = 50 + (Math.random()-0.5)*80;
    const cy = 40 + (Math.random()-0.5)*60;
    s.style.left = cx+'%';
    s.style.top = cy+'%';
    const sparkColor = colors[Math.floor(Math.random()*colors.length)];
    s.style.background = sparkColor;
    s.style.boxShadow = `0 0 8px 2px ${sparkColor}`;
    s.style.width = s.style.height = (4+Math.random()*8)+'px';
    const tx = (Math.random()-0.5)*300;
    const ty = (Math.random()-0.5)*300;
    s.style.setProperty('--tx', `translateX(${tx}px)`);
    s.style.setProperty('--ty', `translateY(${ty}px)`);
    s.style.animationDelay = (Math.random()*.8+.2)+'s';
    s.style.animationDuration = (1+Math.random()*1.5)+'s';
    container.appendChild(s);
  }
}

function closeReveal() {
  playClick();
  if (continueDelayTimer) { clearTimeout(continueDelayTimer); continueDelayTimer = null; }
  document.getElementById('btn-continue').classList.remove('show');
  document.getElementById('reveal-overlay').style.display = 'none';
  document.getElementById('btn-open').disabled = false;
  isAnimating = false;
  renderInventory();
  renderIndex();
}

// ══════════════════════════════════════════════
//  CONFETTI
// ══════════════════════════════════════════════
const cnv = document.getElementById('confetti-canvas');
const cctx = cnv.getContext('2d');
let pieces = [], raf;

function spawnConfetti(rarity) {
  const r = RARITIES.find(x => x.id===rarity);
  const count = {common:18,uncommon:45,rare:70,epic:100,legendary:160,mythic:220,godly:320}[rarity]||20;
  cnv.width = innerWidth; cnv.height = innerHeight;
  for (let i=0;i<count;i++) {
    pieces.push({
      x: Math.random()*cnv.width,
      y: Math.random()*cnv.height*.3 - 50,
      vx: (Math.random()-.5)*8,
      vy: Math.random()*4+1,
      size: 5+Math.random()*12,
      color: r.confetti[Math.floor(Math.random()*r.confetti.length)],
      rot: Math.random()*360,
      rs: (Math.random()-.5)*12,
      shape: ['rect','circle','tri'][Math.floor(Math.random()*3)],
      opacity: 1,
      drag: .98+Math.random()*.01,
    });
  }
  if (raf) cancelAnimationFrame(raf);
  tickConfetti();
}

function tickConfetti() {
  cctx.clearRect(0,0,cnv.width,cnv.height);
  pieces = pieces.filter(p=>p.opacity>.01);
  pieces.forEach(p=>{
    p.x+=p.vx; p.y+=p.vy; p.rot+=p.rs;
    p.vy+=.15; p.vx*=p.drag;
    if(p.y>cnv.height) p.opacity=0;
    else p.opacity=Math.max(0,p.opacity-.004);
    cctx.save();
    cctx.globalAlpha=p.opacity;
    cctx.translate(p.x,p.y);
    cctx.rotate(p.rot*Math.PI/180);
    cctx.fillStyle=p.color;
    if(p.shape==='circle'){
      cctx.beginPath();cctx.arc(0,0,p.size/2,0,Math.PI*2);cctx.fill();
    } else if(p.shape==='tri'){
      cctx.beginPath();cctx.moveTo(0,-p.size/2);cctx.lineTo(p.size/2,p.size/2);cctx.lineTo(-p.size/2,p.size/2);cctx.closePath();cctx.fill();
    } else {
      cctx.fillRect(-p.size/2,-p.size/4,p.size,p.size/2);
    }
    cctx.restore();
  });
  if(pieces.length>0) raf=requestAnimationFrame(tickConfetti);
}

// ══════════════════════════════════════════════
//  RENDER: INVENTORY
// ══════════════════════════════════════════════
function renderInventory() {
  const grid = document.getElementById('inv-grid');
  const chip = document.getElementById('inv-stat-chip');
  const owned = CHARACTERS.filter(c=>inventory[c.id]);
  chip.textContent = `${owned.length} / ${CHARACTERS.length} Townley's`;

  if (!owned.length) {
    grid.innerHTML = `<div class="empty-state"><div class="empty-icon">📦</div><p>Open some packs to build your collection!</p></div>`;
    return;
  }

  const sorted = [...owned].sort((a,b)=>{
    const rd = RARITY_ORDER.indexOf(b.rarity)-RARITY_ORDER.indexOf(a.rarity);
    return rd !== 0 ? rd : (inventory[b.id]||0)-(inventory[a.id]||0);
  });

  grid.innerHTML = sorted.map(c=>{
    const count = inventory[c.id]||0;
    const isNew = !!newItems[c.id];
    const rLabel = RARITIES.find(r=>r.id===c.rarity).label;
    return `<div class="char-card rb-${c.rarity}" onclick="openPreview('${c.id}')">
      <img src="${c.img}" alt="${c.name}" loading="lazy" decoding="async" onerror="this.style.display='none'">
      <div class="badge-count">×${count}</div>
      ${isNew?'<div class="badge-new">NEW!</div>':''}
      <div class="char-card-info">
        <div class="char-card-name rc-${c.rarity}">${c.name}</div>
        <div class="char-card-rarity rc-${c.rarity}">${rLabel}</div>
      </div>
    </div>`;
  }).join('');
}

// ══════════════════════════════════════════════
//  RENDER: INDEX
// ══════════════════════════════════════════════
function renderIndex() {
  const inner = document.getElementById('index-inner');
  inner.innerHTML = RARITY_ORDER.map(rId=>{
    const rData = RARITIES.find(r=>r.id===rId);
    const chars = CHARACTERS.filter(c=>c.rarity===rId);
    const ownedCount = chars.filter(c=>inventory[c.id]).length;
    const pct = Math.round((ownedCount/chars.length)*100);

    const cards = chars.map(c=>{
      const owned = inventory[c.id]>0;
      return `<div class="index-card rb-${rId}" style="opacity:${owned?1:.55}" onclick="openPreview('${c.id}')">
        ${owned
          ?`<img src="${c.img}" alt="${c.name}" loading="lazy" decoding="async" onerror="this.style.display='none'">`
          :`<div class="index-card-locked">🔒</div>`}
        <div class="index-card-info">
          <div class="index-card-name rc-${rId}">${c.name}</div>
          <div class="index-card-status ${owned?'owned':''}">${owned?'✓ owned':'locked'}</div>
        </div>
      </div>`;
    }).join('');

    return `<div class="index-section">
      <div class="index-section-header">
        <span class="index-section-pill rp-${rId}">${rData.label}</span>
        <span class="index-progress-text">${ownedCount}/${chars.length}</span>
        <div class="index-progress-bar"><div class="index-progress-fill" style="width:${pct}%;background:${rData.color}"></div></div>
        <span class="index-progress-text">${rData.chance}%</span>
      </div>
      <div class="index-grid">${cards}</div>
    </div>`;
  }).join('');
}

function switchTab(page) {
  playTab();
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelector(`[data-page="${page}"]`).classList.add('active');

}

}

// ══════════════════════════════════════════════
//  IMAGE PRELOADING (fixes slow/late-loading reveal images)
// ══════════════════════════════════════════════
function preloadCharacterImages() {
  // Warm the browser's cache for every character image in the background,
  // common rarities first since they're pulled most often. By the time a
  // pack is opened, the image is usually already downloaded and decoded,
  // so it shows instantly instead of popping in (or briefly showing the
  // previous reveal's art while the new one is still in flight).
  const ordered = RARITY_ORDER.flatMap(r => CHARACTERS.filter(c => c.rarity === r));
  ordered.forEach(c => {
    if (preloadedImages[c.id]) return;
    const im = new Image();
    im.decoding = 'async';
    im.src = c.img;
    preloadedImages[c.id] = im;
  });
}

// ══════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════
loadState();
buildRarityBars();
buildAmbientParticles();
applySoundLabel();
updatePackStats();
renderInventory();
renderIndex();

// Preload all character art in the background without blocking first paint
if ('requestIdleCallback' in window) requestIdleCallback(preloadCharacterImages);
else setTimeout(preloadCharacterImages, 50);

// Check if any new items are pending
if (Object.keys(newItems).length > 0) {
  document.getElementById('inv-notif').classList.add('show');
}

document.addEventListener('click', ()=>{ try{ac().resume()}catch(e){} }, {once:true});
</script>
</body>
</html>
